{% extends "base.html" %}

{% block title %}Delete Memo | MemoTrack{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold tracking-tight">Delete Memorandum</h1>
  <p class="text-sm text-slate-500 mt-2">This action cannot be undone.</p>

  <div class="mt-6 rounded-2xl bg-white border border-slate-100 shadow-soft p-6">
    <div class="font-semibold">{{ memo.title }}</div>
    <div class="text-sm text-slate-500 mt-1">{{ memo.date }} • {{ memo.start_time }} - {{ memo.end_time }}</div>

    <form method="post" class="mt-6 flex items-center gap-3">
      {% csrf_token %}
      <button type="submit" class="px-4 py-3 rounded-2xl bg-red-600 text-white font-semibold shadow-soft hover:opacity-95 transition">Delete</button>
      <a href="{% url 'memos:memo_list' %}" class="px-4 py-3 rounded-2xl bg-white border border-slate-200 font-semibold hover:border-uniGold transition">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
