<!--
  UNIVERSAL TOAST ENGINE — include on any page
  Usage: add this file to any template via Django include tag
  Django messages are auto-rendered. You can also call
  window.showToast('text', 'success'|'error'|'warning'|'info') from JS
-->

<!-- Toast container — FIXED, top-right, always on top of everything -->
<div id="toastContainer" style="
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  gap: .65rem;
  pointer-events: none;
  max-width: min(420px, calc(100vw - 2rem));
"></div>

<style>
  @keyframes _toastIn {
    from { opacity:0; transform:translateX(30px) scale(.96); }
    to   { opacity:1; transform:translateX(0)    scale(1);   }
  }
  @keyframes _toastOut {
    from { opacity:1; transform:translateX(0)    scale(1);   max-height:120px; margin-bottom:0; }
    to   { opacity:0; transform:translateX(30px) scale(.96); max-height:0;     margin-bottom:-0.65rem; }
  }

  .mt-toast {
    pointer-events: auto;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    box-shadow: 0 8px 30px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
    padding: .85rem 1rem;
    display: flex;
    align-items: flex-start;
    gap: .75rem;
    animation: _toastIn .35s cubic-bezier(.16,1,.3,1) both;
    overflow: hidden;
    position: relative;
  }
  .mt-toast.removing {
    animation: _toastOut .4s cubic-bezier(.4,0,1,1) forwards;
  }

  .mt-toast-icon {
    width: 36px; height: 36px; border-radius: .6rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .mt-toast-icon svg { width: 18px; height: 18px; display: block; }

  .mt-toast-body  { flex: 1; min-width: 0; }
  .mt-toast-title { font-weight: 700; font-size: .82rem; margin-bottom: .15rem; }
  .mt-toast-msg   { font-size: .78rem; color: #4a5568; line-height: 1.45; }
  .mt-toast-close {
    background: none; border: none; cursor: pointer;
    width: 24px; height: 24px; border-radius: .4rem;
    display: flex; align-items: center; justify-content: center;
    color: #a0aec0; font-size: .8rem; flex-shrink: 0; margin-top: 2px;
    transition: background .12s, color .12s;
  }
  .mt-toast-close:hover { background: #f1f5f9; color: #4a5568; }

  /* Progress bar */
  .mt-toast-bar {
    position: absolute; bottom: 0; left: 0; height: 3px;
    border-radius: 0 0 1rem 1rem;
    transition: width linear;
  }

  /* Variants */
  .mt-toast.success { border-left: 4px solid #10b981; }
  .mt-toast.success .mt-toast-icon  { background: #d1fae5; }
  .mt-toast.success .mt-toast-icon svg { color: #065f46; }
  .mt-toast.success .mt-toast-title { color: #065f46; }
  .mt-toast.success .mt-toast-bar   { background: #10b981; }

  .mt-toast.error { border-left: 4px solid #ef4444; }
  .mt-toast.error .mt-toast-icon  { background: #fee2e2; }
  .mt-toast.error .mt-toast-icon svg { color: #991b1b; }
  .mt-toast.error .mt-toast-title { color: #991b1b; }
  .mt-toast.error .mt-toast-bar   { background: #ef4444; }

  .mt-toast.warning { border-left: 4px solid #f59e0b; }
  .mt-toast.warning .mt-toast-icon  { background: #fef3c7; }
  .mt-toast.warning .mt-toast-icon svg { color: #92400e; }
  .mt-toast.warning .mt-toast-title { color: #92400e; }
  .mt-toast.warning .mt-toast-bar   { background: #f59e0b; }

  .mt-toast.info { border-left: 4px solid #3b82f6; }
  .mt-toast.info .mt-toast-icon  { background: #dbeafe; }
  .mt-toast.info .mt-toast-icon svg { color: #1e40af; }
  .mt-toast.info .mt-toast-title { color: #1e40af; }
  .mt-toast.info .mt-toast-bar   { background: #3b82f6; }
</style>

<script>
(function () {
  /* Inline SVG icons — no Font Awesome dependency, always render instantly */
  const ICONS = {
    success: '<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm3.707-9.293a1 1 0 0 0-1.414-1.414L9 10.586 7.707 9.293a1 1 0 0 0-1.414 1.414l2 2a1 1 0 0 0 1.414 0l4-4z" clip-rule="evenodd"/></svg>',
    error:   '<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>',
    warning: '<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2z" clip-rule="evenodd"/></svg>',
    info:    '<svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9z" clip-rule="evenodd"/></svg>',
  };
  const TITLES = {
    success: 'Success',
    error:   'Error',
    warning: 'Warning',
    info:    'Info',
  };

  function calcDuration(text) {
    const ms = 3000 + text.length * 50;
    return Math.min(Math.max(ms, 3000), 10000);
  }

  function showToast(message, type) {
    type = (['success','error','warning','info'].includes(type)) ? type : 'info';
    const duration  = calcDuration(message);
    const container = document.getElementById('toastContainer');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = 'mt-toast ' + type;
    toast.innerHTML =
      '<div class="mt-toast-icon">' + ICONS[type] + '</div>' +
      '<div class="mt-toast-body">' +
        '<div class="mt-toast-title">' + TITLES[type] + '</div>' +
        '<div class="mt-toast-msg">' + message + '</div>' +
      '</div>' +
      '<button class="mt-toast-close" aria-label="Close">&#x2715;</button>' +
      '<div class="mt-toast-bar" style="width:100%;transition-duration:' + duration + 'ms;"></div>';

    container.appendChild(toast);

    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        var bar = toast.querySelector('.mt-toast-bar');
        if (bar) bar.style.width = '0%';
      });
    });

    function removeToast() {
      toast.classList.add('removing');
      toast.addEventListener('animationend', function() { toast.remove(); }, { once: true });
    }

    var timer = setTimeout(removeToast, duration);
    toast.querySelector('.mt-toast-close').addEventListener('click', function() {
      clearTimeout(timer);
      removeToast();
    });
  }

  window.showToast = showToast;

  document.addEventListener('DOMContentLoaded', function() {
    var msgEl = document.getElementById('djangoMessages');
    if (!msgEl) return;
    try {
      var msgs = JSON.parse(msgEl.textContent || '[]');
      msgs.forEach(function(m, i) {
        setTimeout(function() { showToast(m.message, m.type); }, 100 + i * 120);
      });
    } catch(e) {}
  });
})();
</script>

<!-- Django messages rendered as JSON for the JS engine above -->
{% if messages %}
<script id="djangoMessages" type="application/json">
[{% for message in messages %}{"message": "{{ message|escapejs }}", "type": "{% if 'error' in message.tags %}error{% elif 'success' in message.tags %}success{% elif 'warning' in message.tags %}warning{% else %}info{% endif %}"}{% if not forloop.last %},{% endif %}{% endfor %}]
</script>
{% endif %}
