{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SkedIt System{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            uniGreen: "#2F6B2F",
            uniGold: "#F2B705",
          },
          boxShadow: {
            soft: "0 10px 30px rgba(0,0,0,0.08)",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    html, body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      height: 100%;
      margin: 0;
    }
    /* The outer shell fills viewport exactly */
    #app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    /* Sidebar: fixed height, own scrollbar, never pushes content */
    #app-sidebar {
      flex-shrink: 0;
      width: 288px; /* w-72 */
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-right: 1px solid #f1f5f9;
      position: sticky;
      top: 0;
    }
    /* Main area: own scroll */
    #app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      min-width: 0;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-green-50 text-slate-800">
  <div id="app-shell">
    <div id="app-sidebar">
      {% include "partials/sidebar.html" %}
    </div>

    <div id="app-main">
      {% include "partials/topbar.html" %}
      <main class="px-4 sm:px-6 lg:px-10 py-6 flex-1">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  {% include "partials/toasts.html" %}

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</body>
</html>
